<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Gallery | Secure Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <!-- NEW ELEGANT PASSWORD LOGIN WALL (Screen 1 Improved) -->
    <div id="loginGate" class="gate-overlay">
        <div class="gate-card">
            <div class="gate-header-art">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2>Secure Gateway</h2>
            <p>Authorized access only. Enter your credentials to manage the storefront.</p>
            
            <div class="input-container">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="gatePassword" placeholder="Master Access Code">
            </div>
            
            <button onclick="verifyGatePassword()" class="btn-gate">Unlock Dashboard</button>
            <a href="index.html" class="back-to-store"><i class="fa-solid fa-arrow-left-long"></i> Back to Main Website</a>
        </div>
    </div>

    <!-- NEW MODERN ADMIN DASHBOARD (Screen 2 Improved) -->
    <div id="adminDashboard" class="admin-dashboard-container hidden">
        <aside class="admin-sidebar">
            <div class="sidebar-top">
                <div class="sidebar-brand">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Milk Admin</span>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" class="active"><i class="fa-solid fa-sliders"></i> Control Panel</a>
                </nav>
            </div>
            <button onclick="lockDashboard()" class="logout-btn"><i class="fa-solid fa-power-off"></i> Lock Panel</button>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="topbar-left">
                    <h2>Live Website Controller</h2>
                    <p class="topbar-sub">Easily update your website branding, images, and links instantly.</p>
                </div>
            </header>

            <div class="admin-grid">
                <!-- 1. Contacts & Credentials Widget -->
                <div class="admin-widget">
                    <div class="widget-header">
                        <div class="widget-icon"><i class="fa-solid fa-lock"></i></div>
                        <h3>Security & Contacts</h3>
                    </div>
                    <div class="input-field">
                        <label>Change Master Password</label>
                        <input type="password" id="adminNewPass" placeholder="Enter new secret code">
                    </div>
                    <div class="input-field">
                        <label>WhatsApp Number (e.g. 923019215448)</label>
                        <input type="text" id="adminPhone" placeholder="Without spaces or + sign">
                    </div>
                    <div class="input-field">
                        <label>Google Map Location Link</label>
                        <input type="text" id="adminMapLink" placeholder="Paste Google Map URL">
                    </div>
                    <button onclick="saveContactAndSecurity()" class="btn-widget-primary">Save Core Details</button>
                </div>

                <!-- 2. Logo & Branding Customizer -->
                <div class="admin-widget">
                    <div class="widget-header">
                        <div class="widget-icon"><i class="fa-solid fa-crown"></i></div>
                        <h3>Branding Customizer</h3>
                    </div>
                    <div class="input-field">
                        <label>Logo Text</label>
                        <input type="text" id="adminLogoText" placeholder="e.g. Milk Gallery">
                    </div>
                    <div class="input-field">
                        <label>Logo Glow Accent Color</label>
                        <select id="adminLogoGlow">
                            <option value="rgba(37, 99, 235, 0.5)">Royal Blue Glow</option>
                            <option value="rgba(245, 158, 11, 0.5)">Classic Gold Glow</option>
                            <option value="rgba(16, 185, 129, 0.5)">Emerald Green Glow</option>
                        </select>
                    </div>
                    <button onclick="saveBranding()" class="btn-widget-primary">Update Logo Style</button>
                </div>

                <!-- 3. Multiple Photo Uploads Widget -->
                <div class="admin-widget full-width-widget">
                    <div class="widget-header">
                        <div class="widget-icon"><i class="fa-solid fa-images"></i></div>
                        <h3>Upload Storefront Photos</h3>
                    </div>
                    <div class="upload-row">
                        <div class="input-field">
                            <label>Product Card 1 Image</label>
                            <input type="file" id="fileUpload1" accept="image/*" class="file-picker">
                        </div>
                        <div class="input-field">
                            <label>Product Card 2 Image</label>
                            <input type="file" id="fileUpload2" accept="image/*" class="file-picker">
                        </div>
                        <div class="input-field">
                            <label>Product Card 3 Image</label>
                            <input type="file" id="fileUpload3" accept="image/*" class="file-picker">
                        </div>
                    </div>
                    <button onclick="publishImages()" class="btn-widget-success">Publish Live Updates</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
